name: SurvivalCore
version: '${version}'
main: com.survivalcore.SurvivalCore
api-version: '1.21'
authors: [SurvivalTeam]
description: Plugin monolithique custom pour serveur survival RPG
depend: [Vault]
softdepend: [PlaceholderAPI, BlueMap, MythicMobs, SlimeFun]

commands:
  # ── Navigation ──────────────────────────────────────────────
  spawn:
    description: Retourner au spawn du serveur
    permission: survival.spawn
    aliases: [lobby]
  menu:
    description: Ouvre le menu principal
    permission: survival.menu
  waypoint:
    description: Gérer ses waypoints (minimap)
    permission: survival.waypoint
    usage: /waypoint add <nom>
  deaths:
    description: Voir position de ta dernière mort
    permission: survival.death
  commandes:
    description: Liste de toutes les commandes disponibles
    permission: survival.commandes
    aliases: [aide, cmds]
  # ── Économie & Commerce ──────────────────────────────────────
  balance:
    description: Voir son solde
    permission: survival.economy
    aliases: [bal, money]
  pay:
    description: Payer un autre joueur
    permission: survival.economy
    usage: /pay <joueur> <montant>
  shop:
    description: Boutique admin (acheter / vendre ressources)
    permission: survival.shop
  ah:
    description: Hôtel des enchères — ventes et enchères joueurs
    usage: /ah [sell <prix> [durée_h]] | /ah collect
    permission: survival.auction
    aliases: [hdv, auction]
  vendre:
    description: Mettre l'item en main sur le marché joueur
    permission: survival.market
    usage: /vendre <prix>
  marche:
    description: Parcourir le marché joueur
    permission: survival.market
  # ── Personnage & Progression ─────────────────────────────────
  classe:
    description: Choisir ou voir sa classe RPG
    permission: survival.class
  job:
    description: Choisir ou voir son métier
    permission: survival.job
  quetes:
    description: Voir ses quêtes journalières
    permission: survival.quests
  competences:
    description: Ouvrir l'arbre de compétences
    permission: survival.skills
    aliases: [skills]
  classement:
    description: Classements du serveur
    permission: survival.leaderboard
  arcs:
    description: Voir la progression des arcs narratifs
    permission: survival.arcs
  mission:
    description: Voir la mission hebdomadaire en cours
    permission: survival.weekly
  # ── Serveur ──────────────────────────────────────────────────
  claim:
    description: Protéger un chunk
    permission: survival.claim
    usage: /claim [info|list|unclaim|add <joueur>|remove <joueur>]
  coffre-commun:
    description: Coffre communautaire partagé entre joueurs
    permission: survival.chest
  mods:
    description: Affiche le lien de téléchargement des mods recommandés
    permission: survival.mods
  # ── Admin ────────────────────────────────────────────────────
  admin:
    description: Commandes admin SurvivalCore
    permission: survival.admin
    usage: /admin <reload|givemoney|setweekly|setspawn>

permissions:
  survival.spawn:
    default: true
  survival.menu:
    default: true
  survival.commandes:
    default: true
  survival.class:
    default: true
  survival.job:
    default: true
  survival.economy:
    default: true
  survival.shop:
    default: true
  survival.market:
    default: true
  survival.chest:
    default: true
  survival.quests:
    default: true
  survival.leaderboard:
    default: true
  survival.death:
    default: true
  survival.waypoint:
    default: true
  survival.claim:
    default: true
  survival.auction:
    default: true
  survival.mods:
    default: true
  survival.skills:
    default: true
  survival.arcs:
    default: true
  survival.weekly:
    default: true
  survival.admin:
    default: op
