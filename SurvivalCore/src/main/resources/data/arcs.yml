# Arcs d'exploration — quêtes longues multi-étapes
# Un seul arc actif par joueur à la fois

arcs:
  ruines_oubliees:
    display: "&6🗺 Les Ruines Oubliées"
    description: "Des ruines anciennes ont été détectées dans les profondeurs..."
    reward-money: 1500
    reward-xp: 2000
    reward-title: "&8[&5Explorateur des Ruines&8]"
    steps:
      1:
        type: EXPLORE_BIOME
        target: DEEP_DARK
        description: "Trouve le biome Deep Dark"
        hint: "Descends sous Y=-40 dans les grottes profondes"
      2:
        type: GATHER
        target: SCULK_CATALYST
        amount: 3
        description: "Récupère 3 Catalyseurs de Sculk"
        hint: "Ils poussent dans le Deep Dark"
      3:
        type: KILL_BOSS
        target: WARDEN
        amount: 1
        description: "Élimine le Gardien des Ruines"
        hint: "Le Warden rôde dans les zones sculk"
      4:
        type: GATHER
        target: ECHO_SHARD
        amount: 4
        description: "Récupère 4 Éclats d'Écho"
        hint: "Loot des coffres anciens du Deep Dark"
      5:
        type: DELIVER_ITEM
        target: ECHO_SHARD
        amount: 4
        description: "Dépose les éclats dans le coffre communautaire"
        hint: "Utilise /coffre-commun"

  chasse_au_dragon:
    display: "&c🐉 La Chasse au Dragon"
    description: "Le Dragon de l'End menace l'équilibre du monde..."
    reward-money: 2000
    reward-xp: 3000
    reward-title: "&8[&4Tueur de Dragon&8]"
    steps:
      1:
        type: GATHER
        target: ENDER_PEARL
        amount: 12
        description: "Collecte 12 Perles de l'Ender"
        hint: "Chasse des Endermen"
      2:
        type: GATHER
        target: BLAZE_POWDER
        amount: 12
        description: "Collecte 12 Poudres de Blaze"
        hint: "Tue des Blazes dans le Nether"
      3:
        type: EXPLORE_BIOME
        target: THE_END
        description: "Atteins le portail de l'End"
        hint: "Active le portail avec les Yeux de l'Ender"
      4:
        type: KILL_BOSS
        target: ENDER_DRAGON
        amount: 1
        description: "Tue l'Ender Dragon"
        hint: "Détruis les cristaux avant d'attaquer le dragon"
      5:
        type: GATHER
        target: DRAGON_EGG
        amount: 1
        description: "Récupère l'Œuf de Dragon"
        hint: "Utilise un piston pour déplacer l'œuf"

  temple_du_nether:
    display: "&4🔥 Le Temple du Nether"
    description: "Un temple oublié se cache dans les Wastes du Nether..."
    reward-money: 1000
    reward-xp: 1500
    reward-title: "&8[&cMaître du Nether&8]"
    steps:
      1:
        type: EXPLORE_BIOME
        target: NETHER_WASTES
        description: "Explore les Nether Wastes"
        hint: "Construis un portail du Nether"
      2:
        type: KILL_BOSS
        target: WITHER_SKELETON
        amount: 20
        description: "Élimine 20 Wither Skeletons"
        hint: "Ils se trouvent dans les forteresses du Nether"
      3:
        type: GATHER
        target: WITHER_SKELETON_SKULL
        amount: 3
        description: "Obtiens 3 Crânes de Wither Skeleton"
        hint: "Drop rare des Wither Skeletons (chance ~2.5%)"
      4:
        type: KILL_BOSS
        target: WITHER
        amount: 1
        description: "Invoque et tue le Wither"
        hint: "Place 4 Soul Sand + 3 crânes"
      5:
        type: GATHER
        target: NETHER_STAR
        amount: 1
        description: "Récupère l'Étoile du Nether"
        hint: "Loot du Wither"
      6:
        type: DELIVER_ITEM
        target: NETHER_STAR
        amount: 1
        description: "Dépose l'Étoile dans le coffre communautaire"
        hint: "Utilise /coffre-commun"

  expedition_oceanique:
    display: "&b🌊 Expédition Océanique"
    description: "Les profondeurs des océans cachent des trésors oubliés..."
    reward-money: 1200
    reward-xp: 1800
    reward-title: "&8[&bMaître des Abysses&8]"
    steps:
      1:
        type: EXPLORE_BIOME
        target: DEEP_OCEAN
        description: "Atteins l'Océan Profond"
        hint: "Nage vers le large jusqu'aux grandes profondeurs"
      2:
        type: KILL_BOSS
        target: ELDER_GUARDIAN
        amount: 1
        description: "Tue l'Elder Guardian"
        hint: "Il protège les monuments océaniques"
      3:
        type: GATHER
        target: PRISMARINE_SHARD
        amount: 32
        description: "Récupère 32 Éclats de Prismarine"
        hint: "Loot des Guardians et des blocs du monument"
      4:
        type: GATHER
        target: HEART_OF_THE_SEA
        amount: 1
        description: "Trouve un Cœur de la Mer"
        hint: "Dans les coffres au trésor des épaves"
      5:
        type: DELIVER_ITEM
        target: HEART_OF_THE_SEA
        amount: 1
        description: "Dépose le Cœur dans le coffre communautaire"
        hint: "Utilise /coffre-commun"

  legende_de_la_foret:
    display: "&2🌲 La Légende de la Forêt"
    description: "Une forêt ancienne abrite une créature oubliée des temps..."
    reward-money: 800
    reward-xp: 1200
    reward-title: "&8[&2Gardien de la Forêt&8]"
    steps:
      1:
        type: EXPLORE_BIOME
        target: DARK_FOREST
        description: "Pénètre dans la Forêt Sombre"
        hint: "Cherche une grande forêt de chênes sombres"
      2:
        type: GATHER
        target: MUSHROOM_STEW
        amount: 5
        description: "Prépare 5 Soupes aux Champignons"
        hint: "Champignons + bol = soupe"
      3:
        type: KILL_BOSS
        target: EVOKER
        amount: 3
        description: "Élimine 3 Évocateurs"
        hint: "Ils se cachent dans les manoirs de la forêt"
      4:
        type: GATHER
        target: TOTEM_OF_UNDYING
        amount: 1
        description: "Récupère un Totem d'Immortalité"
        hint: "Drop de l'Évocateur"

  conquete_du_ciel:
    display: "&e⚡ La Conquête du Ciel"
    description: "Les pillards envahissent nos terres depuis leurs tours de guet..."
    reward-money: 900
    reward-xp: 1300
    reward-title: "&8[&eHéros de la Guilde&8]"
    steps:
      1:
        type: KILL_BOSS
        target: PILLAGER
        amount: 20
        description: "Élimine 20 Pillards"
        hint: "Attaque un avant-poste de pillards"
      2:
        type: KILL_BOSS
        target: VINDICATOR
        amount: 10
        description: "Élimine 10 Vindicateurs"
        hint: "Ils patrouillent autour des avant-postes"
      3:
        type: KILL_BOSS
        target: RAVAGER
        amount: 1
        description: "Terrasse le Ravageur"
        hint: "Déclenche un raid sur un village"
      4:
        type: KILL_BOSS
        target: ILLUSIONER
        amount: 1
        description: "Bats l'Illusionniste — Chef de guerre"
        hint: "Déclenche un raid au niveau maximum (wave 7)"
      5:
        type: GATHER
        target: EMERALD
        amount: 20
        description: "Offre 20 Émeraudes au village sauvé"
        hint: "En remerciement des villageois"
