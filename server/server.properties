#Minecraft server properties
#Optimisé pour Ace Magician (Intel N100) — 6-7 joueurs

# ── Connexion ──────────────────────────────────────────────────────────
server-port=25565
online-mode=true
max-players=10
network-compression-threshold=256
prevent-proxy-connections=false

# ── Monde ─────────────────────────────────────────────────────────────
level-name=world
level-seed=
level-type=minecraft\:normal
generate-structures=true
gamemode=survival
difficulty=normal
pvp=true
allow-nether=true
allow-end=true
spawn-protection=16
max-world-size=29999984

# ── Performance (tuné pour N100 + 6-7 joueurs) ────────────────────────
view-distance=8
simulation-distance=6
entity-broadcast-range-percentage=75
max-tick-time=60000

# ── Gameplay ──────────────────────────────────────────────────────────
motd=\u00a7bSurvivalCraft \u00a78\u2756 \u00a77Serveur priv\u00e9
white-list=false
enforce-whitelist=false
force-gamemode=false
hardcore=false
allow-flight=false
spawn-monsters=true
spawn-animals=true
spawn-npcs=true

# ── Sécurité / Divers ─────────────────────────────────────────────────
enable-rcon=false
enable-query=false
sync-chunk-writes=true
use-native-transport=true
op-permission-level=4
function-permission-level=2

# ── Resource Pack ──────────────────────────────────────────────
# Remplace SERVER_IP par l'IP LAN du mini PC (ex: 192.168.1.42)
# Pour trouver l'IP : ifconfig | grep "inet " sur le mini PC
# serve-pack.sh (dans server/) demarre le serveur HTTP sur port 8080
resource-pack=http\://SERVER_IP\:8080/Faithless.zip
resource-pack-sha1=ec85350a3148af910b9c5e64298b5d89e50830a3
resource-pack-prompt=\u00a76T\u00e9l\u00e9charge le resource pack pour la meilleure exp\u00e9rience !
require-resource-pack=false
