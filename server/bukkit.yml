# ================================================================
#  bukkit.yml — Configuration Bukkit pour SurvivalCraft
#
#  TERRA WORLD GENERATOR :
#  Pour activer les biomes custom Terra sur un NOUVEAU monde,
#  décommente la section "worlds:" ci-dessous.
#
#  ⚠ ATTENTION : Si le dossier "world/" existe déjà, supprime-le
#  d'abord (sauvegarde tes données !) puis relance le serveur.
#  Terra ne régénère pas les chunks existants.
#
#  Commande utile : /terra reload (après changement de config)
# ================================================================

settings:
  allow-end: true
  warn-on-overload: true
  permissions-file: permissions.yml
  update-folder: update
  plugin-profiling: false
  connection-throttle: 4000
  query-plugins: true
  deprecated-verbose: default
  shutdown-message: "Serveur en arrêt. À bientôt !"

# ── Générateur de monde Terra — ACTIF ───────────────────────────
# Terra génère les biomes custom SurvivalCraft pour le monde principal.
# Le Nether et l'End restent en génération vanilla.
#
# ⚠ Si tu as déjà un monde existant (dossier server/world/), les
#   nouveaux chunks utiliseront Terra mais les anciens restent vanilla.
#   Pour un monde 100% custom, supprime server/world/ avant le 1er lancement.

worlds:
  world:
    generator: Terra:SurvivalCraft

# ── Configuration du spawn ────────────────────────────────────────
spawn-limits:
  monsters: 70
  animals: 15
  water-animals: 5
  water-ambient: 20
  water-underground-creature: 5
  axolotls: 5
  ambient: 15

chunk-gc:
  period-in-ticks: 600

ticks-per:
  animal-spawns: 400
  monster-spawns: 1
  water-spawns: 1
  water-ambient-spawns: 1
  water-underground-creature-spawns: 1
  axolotl-spawns: 1
  ambient-spawns: 1
  autosave: 6000

aliases: now-in-commands.yml
