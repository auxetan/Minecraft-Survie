id: "ENCHANTED_MEADOW"
extends: "MEADOW"

color:
  water: "#8affcc"
  fog: "#b0f0d8"
  sky: "#c8f0e0"
  grass: "#5ab87a"
  foliage: "#4aad6a"

sounds:
  additions:
  - "entity.bee.loop"
  mood:
    sound: "entity.fox.ambient"
    delay: 5000
    range: 8

surface:
  top: "GRASS_BLOCK"
  filler: "DIRT"
  ocean: "GRAVEL"

terrain:
  noiseMultiplier: 0.7
  heightOffset: 2
