# ================================================================
#  Biome : Vallée Sakura — étend CHERRY_GROVE
#  Pétales partout, rivières roses, ambiance paisible.
#  (structures et mobs custom retirés)
# ================================================================

id: "SAKURA_VALLEY"
extends: "CHERRY_GROVE"

color:
  water: "#ff9dc8"
  fog: "#f5c8e0"
  sky: "#ffd6e8"
  grass: "#e8b4c8"
  foliage: "#d48090"

sounds:
  additions:
  - "block.cherry_leaves.break"
  mood:
    sound: "entity.bee.loop"
    delay: 5000
    range: 8

surface:
  top: "GRASS_BLOCK"
  filler: "DIRT"
  ocean: "GRAVEL"

terrain:
  noiseMultiplier: 0.6
  heightOffset: -5
