# ================================================================
#  Biome : Jungle Ancienne — étend JUNGLE
#  Végétation dense, terrain plus accidenté, ambiance mystérieuse.
#  (structures et mobs custom retirés — Terra utilise la génération vanilla)
# ================================================================

id: "ANCIENT_JUNGLE"
extends: "JUNGLE"

color:
  water: "#004d2e"
  fog: "#0a2e10"
  sky: "#1a3d1a"
  grass: "#2d7a1a"
  foliage: "#1f6012"

sounds:
  additions:
  - "entity.parrot.ambient"
  mood:
    sound: "entity.ocelot.ambient"
    delay: 4000
    range: 12

surface:
  top: "MOSS_BLOCK"
  filler: "ROOTED_DIRT"
  ocean: "GRAVEL"

terrain:
  noiseMultiplier: 0.9
  heightOffset: 5
