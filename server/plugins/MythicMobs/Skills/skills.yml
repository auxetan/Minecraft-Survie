# ── Élite Skills ─────────────────────────────────────────────────

PoisonAura:
  Skills:
  - potion{t=POISON;d=80;l=0;radius=3} @PlayersInRadius{r=3}

GroanOnHit:
  Skills:
  - sound{s=ENTITY_ZOMBIE_HURT;v=1.5;p=0.8}

BlindnessArrow:
  Skills:
  - potion{t=BLINDNESS;d=60;l=0} @Target

SpeedBurst:
  Skills:
  - potion{t=SPEED;d=40;l=2} @Self

CrystalSplash:
  Skills:
  - projectile{onTick=CrystalSplash_Tick;v=1;i=1;hn=5;ml=20} =4 @players{r=8}

CrystalSplash_Tick:
  Skills:
  - effect:particles{p=CRIT_MAGIC;amount=3}

VoidTeleport:
  Cooldown: 3
  Skills:
  - teleport{flocation=@Target}
  - potion{t=DAMAGE_RESISTANCE;d=20;l=1} @Self
  - effect:particles{p=PORTAL;amount=30;oy=0} @Self

LevitateTarget:
