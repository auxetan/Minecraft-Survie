  - damage{a=3;ignoreArmor=false;preventknockback=true} @PlayersInRadius{r=3}
  - ignite{t=40} @PlayersInRadius{r=3}

TridentVolley:
  Cooldown: 5
  Skills:
  - projectile{onTick=Trident_Tick;v=2;hn=1;ml=30} =3 @Target

Trident_Tick:
  Skills:
  - effect:particles{p=WATER_SPLASH;amount=5}

WaterCurse:
  Cooldown: 8
  Skills:
  - potion{t=SLOWNESS;d=100;l=1} @Target
  - potion{t=HUNGER;d=80;l=0} @Target
