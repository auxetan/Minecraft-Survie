# ── Boss Skills — Roi Zombi ──────────────────────────────────────

RoiZombi_GroundSlam:
  Cooldown: 5
  Skills:
  - damage{a=20;ignoreArmor=false} @PlayersInRadius{r=6}
  - velocity{v=0.5;y=0.5} @PlayersInRadius{r=6}
  - blocksphere{material=GRAVEL;size=2;durationticks=40} @Self
  - sound{s=ENTITY_ZOMBIE_ATTACK_IRON_DOOR;v=3;p=0.5}
  - effect:particles{p=EXPLOSION_LARGE;amount=5;oy=0;radius=3} @Self

RoiZombi_ZombieHorde:
  Cooldown: 12
  Skills:
  - mob{m=ZOMBIE;amount=4;radius=5} @Self
  - message{m='&4&lLe Roi Zombi appelle sa horde !'} @PlayersInRadius{r=40}

RoiZombi_PhaseTwo:
  Skills:
  - message{m='&4&l⚔ Le Roi Zombi entre en Rage ! ⚔'} @PlayersInRadius{r=40}
  - sound{s=ENTITY_ZOMBIE_ATTACK_WOODEN_DOOR;v=4;p=0.6}
  - potion{t=REGENERATION;d=100;l=1} @Self
  - potion{t=RESISTANCE;d=100;l=0} @Self
  - setdisplaymeta{n='&4&l⚔ Le Roi Zombi &c[ENRAGÉ] ⚔'}
  - effect:particles{p=LAVA;amount=30;oy=2;radius=3} @Self

RoiZombi_BoneWall:
  Cooldown: 8
  Skills:
  - spread{s=RoiZombi_ThrowBone;n=6;sp=15;cd=1}

RoiZombi_ThrowBone:
  Skills:
  - projectile{onHit=Bone_Hit;v=3;hn=1;ml=30}

Bone_Hit:
  Skills:
  - damage{a=12;ignoreArmor=false}
  - potion{t=SLOWNESS;d=60;l=1} @Target

RoiZombi_Berserk:
  Skills:
  - message{m='&4&l☠ LE ROI ZOMBI ENTRE EN FURIE ! ☠'} @PlayersInRadius{r=60}
  - sound{s=ENTITY_ZOMBIE_HURT;v=5;p=0.4}
  - potion{t=SPEED;d=999;l=1} @Self
  - potion{t=STRENGTH;d=999;l=2} @Self
  - setdisplaymeta{n='&c&l☠ Le Roi Zombi [FURIE] ☠'}

RoiZombi_DeathRattle:
  Skills:
  - effect:particles{p=EXPLOSION_HUGE;amount=10;oy=1;radius=5} @Self
  - sound{s=ENTITY_ZOMBIE_ATTACK_HEAVY_ARMOR;v=5;p=0.3}
  - message{m='&4&l... Le Roi Zombi tombe. Tu es digne.'} @PlayersInRadius{r=60}
  - mob{m=ZOMBIE;amount=8;radius=8} @Self

