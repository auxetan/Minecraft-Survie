  - blocksphere{material=COBWEB;size=1} @Target
  - message{m='&4L''Araignée de Sang te piège !'} @Target

BloodPoison:
  Skills:
  - potion{t=POISON;d=100;l=0} @Target

EmpoweredFireball:
  Cooldown: 4
  Skills:
  - fireball{v=2;hn=1;ml=40;size=2;yield=2} @Target

ArrowBarrage:
  Cooldown: 5
  Skills:
