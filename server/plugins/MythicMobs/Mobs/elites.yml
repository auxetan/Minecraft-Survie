# ================================================================
#  SurvivalCraft — Mobs Élites
#  10 élites qui remplacent/complètent les spawns vanilla.
#  Spawn naturellement dans les biomes correspondants.
#  Chance de spawn configurée dans config.yml (ReplacementChance).
# ================================================================

# ── 1. Zombie Corrompu ──────────────────────────────────────────
ZombieCorrompu:
  Type: ZOMBIE
  Display: '&4☠ Zombie Corrompu'
  Health: 80
  Damage: 6
  Armor: 4
  Options:
    MovementSpeed: 0.28
    KnockbackResistance: 0.4
    PreventOtherDrops: true
    PreventSunburn: true
    FollowRange: 40
  BossBar:
    Enabled: true
    Title: '&4☠ Zombie Corrompu'
    Range: 24
    Color: RED
    Style: SEGMENTED_6
  Equipment:
  - ROTTEN_FLESH:0 HAND
  Skills:
  - skill{s=PoisonAura} ~onTimer:40 1
  - skill{s=GroanOnHit} ~onAttack 1
  - effect:particles{p=DRIPPING_WATER;amount=8;oy=1} ~onTimer:20 1
  Drops:
  - ROTTEN_FLESH 2-5 1
  - BONE 1-2 0.5
  - ZOMBIE_HEAD 1 0.03
  - EliteEssence 1 0.15
  AIGoalSelectors:
  - clear
  - meleeAttack
  AITargetSelectors:
  - clear
  - players

