##
## BlueMap Core Config — SurvivalCraft
## Docs: https://bluemap.bluecolored.de/wiki/
##

# Où stocker les données de la carte (tuiles, etc.)
# Mettre sur un disque rapide si disponible.
data: "bluemap"

# Port du serveur web intégré
# Accessible via http://<IP>:8123 dans un navigateur
# Pour un accès internet : créer un tunnel HTTP dans playit.gg pour ce port.
webserver {
  enabled: true
  port: 8123
  maxConnectionCount: 100
}

# Rendre les chunks non chargés (zones non explorées)
# false = n'affiche que les zones visitées par les joueurs
renderUnexplored: false

# Envoyer des stats anonymes (désactivé pour la vie privée)
metrics: false
