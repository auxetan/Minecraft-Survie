##
## BlueMap Plugin Config
##

# Mettre à jour la carte en temps réel (joueurs visibles sur la carte)
livePlayerMarkers: true

# Afficher les morts des joueurs sur la carte (markers temporaires)
deathMarkers: true
deathMarkerDuration: 600  # secondes

# Afficher les zones protégées (Claims)
# Nécessite un addon BlueMap-Addon-Residence ou manuel
#worldBorderMarkers: true

# Intervalle de mise à jour de la carte en minutes
# 0 = mise à jour continue (charge CPU)
updateInterval: 5
